services:
  - type: web
    name: salesai-platform
    runtime: python
    buildCommand: pip install -r requirements.txt && python -c "from models import init_db; init_db()"
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
    disk:
      name: salesai-db
      mountPath: /opt/render/project/src
      sizeGB: 1
